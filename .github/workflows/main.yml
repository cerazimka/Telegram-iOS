name: Build ExteraGram

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: 'Build configuration (release_arm64 or debug_arm64)'
        required: false
        default: 'release_arm64'

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: '0'

      - name: Set active Xcode path
        run: |
          # Use latest available Xcode on the runner
          XCODE_PATH=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then
            XCODE_PATH=$(xcode-select -p | sed 's|/Contents/Developer||')
          fi
          echo "Using Xcode at: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: Create canonical source directory
        run: |
          set -x
          sudo mkdir -p /Users/Shared
          cp -R $GITHUB_WORKSPACE /Users/Shared/
          mv /Users/Shared/$(basename $GITHUB_WORKSPACE) /Users/Shared/telegram-ios

      - name: Build the App
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
        run: |
          set -x

          SOURCE_DIR=/Users/Shared/telegram-ios
          BAZEL_USER_ROOT="/private/var/tmp/_bazel_containerhost"

          cd $SOURCE_DIR

          # Patch build config with API credentials from secrets (if provided)
          python3 - <<'PYEOF'
import json, os, sys

config_path = 'build-system/appstore-configuration.json'
with open(config_path) as f:
    config = json.load(f)

api_id = os.environ.get('TELEGRAM_API_ID', '').strip()
api_hash = os.environ.get('TELEGRAM_API_HASH', '').strip()

if api_id:
    config['api_id'] = api_id
if api_hash:
    config['api_hash'] = api_hash

with open(config_path, 'w') as f:
    json.dump(config, f, indent=2)

print(f"Build config: bundle_id={config['bundle_id']}, api_id={config['api_id']}")
PYEOF

          BUILD_NUMBER_OFFSET="$(cat build_number_offset)"
          export APP_VERSION=$(python3 -c 'import json,sys; obj=json.load(open("versions.json")); print(obj["app"])')
          export COMMIT_COUNT=$(git rev-list --count HEAD)
          export COMMIT_COUNT="$(($COMMIT_COUNT+$BUILD_NUMBER_OFFSET))"
          export BUILD_NUMBER="$COMMIT_COUNT"
          echo "BUILD_NUMBER=${BUILD_NUMBER}" >> $GITHUB_ENV
          echo "APP_VERSION=${APP_VERSION}" >> $GITHUB_ENV

          python3 build-system/Make/ImportCertificates.py --path build-system/fake-codesigning/certs

          python3 -u build-system/Make/Make.py \
            --bazelUserRoot="$BAZEL_USER_ROOT" \
            --overrideXcodeVersion \
            build \
            --configurationPath="build-system/appstore-configuration.json" \
            --codesigningInformationPath=build-system/fake-codesigning \
            --configuration=${{ github.event.inputs.configuration || 'release_arm64' }} \
            --buildNumber="$BUILD_NUMBER"

          # Collect IPA
          OUTPUT_PATH="build/artifacts"
          rm -rf "$OUTPUT_PATH"
          mkdir -p "$OUTPUT_PATH"
          for f in bazel-out/applebin_ios-ios_arm*-opt-ST-*/bin/Telegram/Telegram.ipa; do
            cp "$f" "$OUTPUT_PATH/ExteraGram.ipa"
          done

          # Collect dSYMs
          mkdir -p build/DSYMs
          for f in bazel-out/applebin_ios-ios_arm*-opt-ST-*/bin/Telegram/*.dSYM; do
            cp -R "$f" build/DSYMs/
          done
          zip -r "$OUTPUT_PATH/ExteraGram.DSYMs.zip" build/DSYMs 1>/dev/null

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ExteraGram-${{ env.APP_VERSION }}-${{ env.BUILD_NUMBER }}
          path: |
            /Users/Shared/telegram-ios/build/artifacts/ExteraGram.ipa
            /Users/Shared/telegram-ios/build/artifacts/ExteraGram.DSYMs.zip
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ env.BUILD_NUMBER }}
          name: ExteraGram ${{ env.APP_VERSION }} (${{ env.BUILD_NUMBER }})
          body: |
            Unsigned build of ExteraGram ${{ env.APP_VERSION }} (build ${{ env.BUILD_NUMBER }})

            > ⚠️ This IPA is not signed with a valid Apple certificate. To install, use AltStore, Sideloadly, or a similar tool.
          draft: false
          prerelease: false
          files: |
            /Users/Shared/telegram-ios/build/artifacts/ExteraGram.ipa
            /Users/Shared/telegram-ios/build/artifacts/ExteraGram.DSYMs.zip
