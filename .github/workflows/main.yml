name: Build exteraGram

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: 'Build configuration (release_arm64 or debug_arm64)'
        required: false
        default: 'release_arm64'

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: '0'

      - name: Set active Xcode path
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then
            XCODE_PATH=$(xcode-select -p | sed 's|/Contents/Developer||')
          fi
          echo "Using Xcode at: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: ~/telegram-bazel-cache
          key: bazel-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'WORKSPACE', 'versions.json') }}
          restore-keys: |
            bazel-${{ runner.os }}-

      - name: Create canonical source directory
        run: |
          set -x
          sudo mkdir -p /Users/Shared
          cp -R $GITHUB_WORKSPACE /Users/Shared/
          mv /Users/Shared/$(basename $GITHUB_WORKSPACE) /Users/Shared/telegram-ios

      - name: Build the App
        run: |
          set -x
          SOURCE_DIR=/Users/Shared/telegram-ios
          BAZEL_USER_ROOT="/private/var/tmp/_bazel_containerhost"
          cd $SOURCE_DIR

          BUILD_NUMBER_OFFSET="$(cat build_number_offset)"
          export APP_VERSION=$(python3 -c 'import json; print(json.load(open("versions.json"))["app"])')
          export COMMIT_COUNT=$(git rev-list --count HEAD)
          export COMMIT_COUNT="$(($COMMIT_COUNT+$BUILD_NUMBER_OFFSET))"
          export BUILD_NUMBER="$COMMIT_COUNT"
          echo "BUILD_NUMBER=${BUILD_NUMBER}" >> $GITHUB_ENV
          echo "APP_VERSION=${APP_VERSION}" >> $GITHUB_ENV

          python3 build-system/Make/ImportCertificates.py --path build-system/fake-codesigning/certs

          OUTPUT_PATH="build/artifacts"
          rm -rf "$OUTPUT_PATH"
          mkdir -p "$OUTPUT_PATH"

          python3 -u build-system/Make/Make.py \
            --bazelUserRoot="$BAZEL_USER_ROOT" \
            --cacheDir="$HOME/telegram-bazel-cache" \
            --overrideXcodeVersion \
            --bazelArguments="--apple_generate_dsym --output_groups=+dsyms" \
            build \
            --configurationPath="build-system/appstore-configuration.json" \
            --codesigningInformationPath=build-system/fake-codesigning \
            --configuration=${{ github.event.inputs.configuration || 'release_arm64' }} \
            --buildNumber="$BUILD_NUMBER" \
            --outputBuildArtifactsPath="$OUTPUT_PATH"

          # Inject symbol maps into IPA so on-device symbolication works
          # without downloading a separate dSYM zip.
          python3 $SOURCE_DIR/.github/scripts/inject_symbols.py \
            "$OUTPUT_PATH/DSYMs" \
            "$OUTPUT_PATH/exteraGram.ipa" || true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: exteraGram-${{ env.APP_VERSION }}-${{ env.BUILD_NUMBER }}
          path: |
            /Users/Shared/telegram-ios/build/artifacts/exteraGram.ipa
            /Users/Shared/telegram-ios/build/artifacts/exteraGram.DSYMs.zip
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ env.BUILD_NUMBER }}
          name: exteraGram ${{ env.APP_VERSION }} (${{ env.BUILD_NUMBER }})
          body: |
            Unsigned build of exteraGram ${{ env.APP_VERSION }} (build ${{ env.BUILD_NUMBER }})

            > This IPA is not signed with a valid Apple certificate. To install, use AltStore, Sideloadly, or a similar tool.
          draft: false
          prerelease: false
          files: |
            /Users/Shared/telegram-ios/build/artifacts/exteraGram.ipa
            /Users/Shared/telegram-ios/build/artifacts/exteraGram.DSYMs.zip
